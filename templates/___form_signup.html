<form mix-post="/api-create-user" autocomplete="off" id="signup_form">
  <div>
    <label for=""
      >First name
      <span
        >{{x.USER_FIRST_NAME_MIN}} to {{x.USER_FIRST_NAME_MAX}} characters</span
      ></label
    >
    <input
      name="user_first_name"
      type="text"
      placeholder="First name"
      value=""
      mix-validate="{{x.REGEX_USER_FIRST_NAME}}"
      id="user_first_name"
    />
    <ul id="signup_error_first_name" class="signup_errors"></ul>
  </div>

  <div>
    <label for=""
      >Last name
      <span
        >{{x.USER_LAST_NAME_MIN}} to {{x.USER_LAST_NAME_MAX}} characters</span
      ></label
    >
    <input
      name="user_last_name"
      type="text"
      placeholder="Last name"
      value=""
      mix-validate="{{x.REGEX_USER_LAST_NAME}}"
      id="user_last_name"
    />
    <ul id="signup_error_last_name" class="signup_errors"></ul>
  </div>

  <div>
    <label for="">Email <span></span></label>
    <input
      name="user_email"
      type="text"
      placeholder="Email"
      value=""
      mix-validate="{{x.REGEX_USER_EMAIL}}"
      id="user_email"
    />
    <ul id="signup_error_email" class="signup_errors"></ul>
  </div>

  <div>
    <label for=""
      >Password
      <span
        >{{x.USER_PASSWORD_MIN}} to {{x.USER_PASSWORD_MAX}} characters</span
      ></label
    >
    <input
      name="user_password"
      type="password"
      placeholder="Password"
      value=""
      mix-validate="{{x.REGEX_USER_PASSWORD}}"
      id="user_password"
    />
    <ul id="signup_error_password" class="signup_errors"></ul>
  </div>
  <button id="button_signup">Signup</button>
  <a href="/login">Go back</a>
</form>
